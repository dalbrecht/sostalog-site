name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sostalog/site exec playwright install --with-deps chromium
      - run: pnpm run test
      - run: pnpm run test:e2e

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify page weight under 100 KB per page (HTML + CSS actually linked)
        run: |
          # Charge each page only for the CSS files it actually <link>s.
          # Summing every dist/_astro/*.css and applying it to every page
          # overcharges as soon as Astro emits per-route CSS chunks.
          fail=0
          while IFS= read -r html; do
            html_size=$(stat -c%s "$html")
            css_total=0
            # Pull href values from <link ...>; keep .css ones; resolve to
            # absolute paths inside dist/ and sum their sizes. Astro emits
            # /_astro/*.css with leading slash; we strip the slash to anchor
            # the path under apps/site/dist.
            while IFS= read -r href; do
              [ -z "$href" ] && continue
              case "$href" in *.css*) ;; *) continue ;; esac
              # Drop any query string and the leading slash if present.
              path="${href%\?*}"
              path="${path#/}"
              full="apps/site/dist/${path}"
              if [ -f "$full" ]; then
                size=$(stat -c%s "$full")
                css_total=$((css_total + size))
              fi
            done < <(grep -oE 'href="[^"]+\.css[^"]*"' "$html" | sed -E 's/^href="//; s/"$//')
            total=$((html_size + css_total))
            rel=${html#apps/site/dist/}
            echo "$rel: ${html_size}B HTML + ${css_total}B CSS = ${total}B"
            if [ "$total" -gt 102400 ]; then
              echo "FAIL: $rel exceeds 100 KB"
              fail=1
            fi
          done < <(find apps/site/dist -name '*.html')
          exit $fail
      - name: Verify zero runtime JS shipped
        run: |
          if ls apps/site/dist/_astro/*.js >/dev/null 2>&1; then
            echo "FAIL: runtime JS bundles detected in dist/"
            ls -la apps/site/dist/_astro/*.js
            exit 1
          fi
          if grep -RIE '<script[^>]*>' apps/site/dist/*.html | grep -v 'type="application/ld\+json"'; then
            echo "FAIL: inline <script> tags detected"
            exit 1
          fi
          echo "OK: no JS shipped"
